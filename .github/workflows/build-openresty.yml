name: Build OpenResty

permissions:
  contents: write

on:
  push:
    branches: [master, main]

  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
      make_latest:
        required: false
        type: boolean
        default: false
      prerelease:
        required: false
        type: boolean
        default: false
    outputs:
      release_version:
        description: "The version of OpenResty being built"
        value: ${{ jobs.prepare.outputs.release_version }}

  workflow_dispatch:
    inputs:
      release_version:
        description: 'OpenResty version to release (e.g. 1.25.3.2)'
        required: true
        type: string
      make_latest:
        description: 'Mark as latest release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.setup.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        id: setup
        run: |
          VERSION="${{ inputs.release_version || '1.25.3.2' }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-linux:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            image: quay.io/pypa/manylinux2014_x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            image: quay.io/pypa/manylinux2014_aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Build in manylinux container
        run: |
          docker run --rm \
            -v "$(pwd)":/workspace \
            -w /workspace \
            -e RELEASE_VERSION="${{ needs.prepare.outputs.release_version }}" \
            -e ARCH="${{ matrix.arch }}" \
            -e OUTPUT_DIR="/workspace" \
            ${{ matrix.image }} \
            sh -c '
              set -e

              # Enable devtoolset for newer GCC if available
              for dts in /opt/rh/devtoolset-*/enable; do
                [ -f "$dts" ] && source "$dts" && break
              done

              chmod +x /workspace/install-deps.sh
              /workspace/install-deps.sh
            '

      - name: Package artifact
        run: |
          VERSION="${{ needs.prepare.outputs.release_version }}"
          ARTIFACT="openresty-$VERSION-linux-glibc2.17-${{ matrix.arch }}"
          sha256sum "$ARTIFACT.tar.xz" > "$ARTIFACT.tar.xz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openresty-linux-${{ matrix.arch }}
          path: |
            openresty-*-linux-glibc2.17-${{ matrix.arch }}.tar.xz
            openresty-*-linux-glibc2.17-${{ matrix.arch }}.tar.xz.sha256

  release:
    needs: [prepare, build-linux]
    if: inputs.release_version != ''
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.release_version }}

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: openresty ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          make_latest: "${{ inputs.make_latest || false }}"
          prerelease: ${{ inputs.prerelease || false }}
          files: |
            openresty-linux-x86_64/openresty-${{ env.VERSION }}-linux-glibc2.17-x86_64.tar.xz
            openresty-linux-x86_64/openresty-${{ env.VERSION }}-linux-glibc2.17-x86_64.tar.xz.sha256
            openresty-linux-aarch64/openresty-${{ env.VERSION }}-linux-glibc2.17-aarch64.tar.xz
            openresty-linux-aarch64/openresty-${{ env.VERSION }}-linux-glibc2.17-aarch64.tar.xz.sha256
